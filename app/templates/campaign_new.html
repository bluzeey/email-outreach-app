<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Campaign - Email Outreach App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Email Outreach App</h1>
            <nav>
                <a href="/">Home</a>
                <a href="/campaigns">Campaigns</a>
                <a href="/auth">Connect Gmail</a>
            </nav>
        </header>
        
        <main>
            <h2>Create New Campaign</h2>
            
            <form id="campaign-form" class="form">
                <div class="form-group">
                    <label for="name">Campaign Name</label>
                    <input type="text" id="name" name="name" required 
                           placeholder="e.g., Q1 Sales Outreach">
                </div>
                
                <div class="form-group">
                    <label for="dry-run">
                        <input type="checkbox" id="dry-run" name="dry_run" checked>
                        Dry-run mode (generate previews only, don't send emails)
                    </label>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Create Campaign</button>
                    <a href="/campaigns" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </main>
        
        <footer>
            <p>Email Outreach App - Built with FastAPI + LangGraph</p>
        </footer>
    </div>
    
    <script>
        document.getElementById('campaign-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const dryRun = document.getElementById('dry-run').checked;
            
            try {
                const response = await fetch('/campaigns', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, dry_run: dryRun })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Redirect to campaign detail
                    window.location.href = `/campaigns/${data.id}`;
                } else {
                    alert('Failed to create campaign: ' + (data.detail || 'Unknown error'));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
    </script>
</body>
</html>
