<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Details - Email Outreach App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Email Outreach App</h1>
            <nav>
                <a href="/">Home</a>
                <a href="/campaigns">Campaigns</a>
                <a href="/leads">Leads</a>
                <a href="/auth">Connect Gmail</a>
            </nav>
        </header>
        
        <main>
            <div id="campaign-details">
                <div style="display: flex; justify-content: center; padding: 4rem;">
                    <div style="text-align: center; color: var(--color-gray-400);">
                        <div style="width: 32px; height: 32px; border: 3px solid var(--color-gray-200); border-top-color: var(--color-primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem;"></div>
                        <p>Loading campaign...</p>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>Email Outreach App — Built with FastAPI + LangGraph</p>
        </footer>
    </div>
    
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .campaign-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--color-gray-200);
        }
        
        .campaign-title {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .campaign-title h2 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .campaign-meta {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            color: var(--color-gray-500);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        
        .campaign-meta span {
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }
        
        .action-bar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .section-card {
            background: #fff;
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .section-card h3 {
            margin-top: 0;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .info-item label {
            font-size: 0.875rem;
            color: var(--color-gray-500);
            font-weight: 500;
        }
        
        .info-item value {
            color: var(--color-gray-800);
            font-weight: 500;
        }
        
        .upload-area {
            border: 2px dashed var(--color-gray-300);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            background: var(--color-gray-50);
            transition: var(--transition);
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: var(--color-primary);
            background: #eff6ff;
        }

        .upload-area.drag-over {
            border-color: var(--color-primary);
            background: #dbeafe;
            border-style: solid;
        }
        
        .draft-card {
            background: #fff;
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        
        .draft-card:last-child {
            margin-bottom: 0;
        }
        
        .draft-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--color-gray-100);
        }
        
        .draft-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.875rem;
            color: var(--color-gray-500);
            margin-bottom: 0.75rem;
        }
        
        .draft-body {
            background: var(--color-gray-50);
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius-sm);
            padding: 1rem;
            font-family: inherit;
            white-space: pre-wrap;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .analysis-progress {
            background: #eff6ff;
            border: 1px solid #dbeafe;
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .analysis-progress h3 {
            margin: 0 0 1rem 0;
            color: #1e40af;
        }
        
        .progress-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.75rem;
            font-size: 0.9rem;
        }
        
        .error-section {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .error-section h3 {
            margin: 0 0 1rem 0;
            color: #dc2626;
        }
        
        .error-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        
        .error-list li {
            padding: 0.5rem 0;
            color: #7f1d1d;
            border-bottom: 1px solid #fecaca;
        }
        
        .error-list li:last-child {
            border-bottom: none;
        }
        
        .schema-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        
        .schema-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .schema-item label {
            font-size: 0.875rem;
            color: var(--color-gray-500);
        }
        
        .schema-item value {
            color: var(--color-gray-800);
            font-weight: 500;
        }
        
        .confidence-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            background: #dbeafe;
            color: #1e40af;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        #rows-section {
            margin-top: 1.5rem;
        }
    </style>
    
    <script>
        const campaignId = window.location.pathname.split('/').pop();
        
        async function loadCampaign() {
            try {
                const response = await fetch(`/api/campaigns/${campaignId}`);
                const campaign = await response.json();
                
                if (!response.ok) {
                    throw new Error(campaign.detail || 'Failed to load campaign');
                }
                
                const container = document.getElementById('campaign-details');
                
                // Store campaign data globally for access by other functions
                window.currentCampaign = campaign;
                
                container.innerHTML = `
                    <div class="campaign-header">
                        <div class="campaign-title">
                            <h2>
                                ${campaign.name}
                                <span class="status-badge status-${campaign.status}">${formatStatus(campaign.status)}</span>
                                ${campaign.dry_run ? '<span style="background: #fef3c7; color: #92400e; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600;">DRY RUN</span>' : ''}
                            </h2>
                            <div class="campaign-meta">
                                <span>📅 Created ${new Date(campaign.created_at).toLocaleDateString()}</span>
                                ${campaign.csv_filename ? `<span>📁 ${campaign.csv_filename}</span>` : ''}
                                ${campaign.totals_json?.total_rows ? `<span>👥 ${campaign.totals_json.total_rows} recipients</span>` : ''}
                            </div>
                        </div>
                        <div class="action-bar">
                            ${getActionButtons(campaign)}
                        </div>
                    </div>
                    
                    ${campaign.errors?.length > 0 ? renderErrorsSection(campaign.errors) : ''}

                    ${renderUploadSection(campaign.csv_filename)}

                    ${campaign.inferred_schema_json && Object.keys(campaign.inferred_schema_json).length > 0 ? renderSchemaSection(campaign.inferred_schema_json) : ''}
                    
                    ${campaign.campaign_plan_json && Object.keys(campaign.campaign_plan_json).length > 0 ? renderPlanSection(campaign.campaign_plan_json) : ''}
                    
                    ${campaign.sample_drafts_json?.length > 0 ? renderSampleDraftsSection(campaign.sample_drafts_json) : ''}
                    
                    <div id="progress-section"></div>
                    
                    <div class="card" style="padding: 0; overflow: hidden;">
                        <div style="padding: 1rem 1.5rem; border-bottom: 1px solid var(--color-gray-200); background: var(--color-gray-50);">
                            <h3 style="margin: 0;">Recipients</h3>
                        </div>
                        <div id="rows-content" style="padding: 1.5rem;">
                            <p style="text-align: center; color: var(--color-gray-400);">Loading recipients...</p>
                        </div>
                    </div>
                `;
                
                if (['running', 'completed', 'paused'].includes(campaign.status)) {
                    loadProgress();
                }
                
                const expectedCount = campaign.totals_json ? campaign.totals_json.total_rows : 0;
                loadRows(expectedCount);
                
            } catch (error) {
                document.getElementById('campaign-details').innerHTML = `
                    <div class="alert alert-error">
                        <strong>Failed to load campaign:</strong> ${error.message}
                        <br><br>
                        <a href="/campaigns" class="btn btn-secondary btn-small">← Back to Campaigns</a>
                    </div>
                `;
            }
        }
        
        function formatStatus(status) {
            return status.replace(/_/g, ' ');
        }
        
        // Global variable to track if there are failed emails
        let hasFailedEmails = false;
        
        function getActionButtons(campaign) {
            const buttons = [];
            
            // Show retry button if campaign is running and we know there are failures
            if (campaign.status === 'running' && hasFailedEmails) {
                buttons.push(`<button onclick="retryAllFailed()" class="btn btn-warning">🔄 Retry Failed</button>`);
            }
            
            if (['created', 'profiling'].includes(campaign.status) && campaign.csv_filename) {
                if (campaign.totals_json?.total_rows > 0) {
                    buttons.push(`<button onclick="analyzeCampaign()" class="btn btn-primary">🔄 Resume Analysis</button>`);
                    buttons.push(`<button onclick="analyzeCampaign(true)" class="btn btn-secondary">Restart</button>`);
                } else {
                    buttons.push(`<button onclick="analyzeCampaign()" class="btn btn-primary">🔍 Analyze</button>`);
                }
            }
            
            if (['awaiting_schema_review', 'awaiting_campaign_approval'].includes(campaign.status)) {
                buttons.push(`<button onclick="startSending()" class="btn btn-success">📧 Start Sending</button>`);
                buttons.push(`<button onclick="rejectCampaign()" class="btn btn-secondary">Reject</button>`);
            }

            // Show Run button for CREATED, PAUSED, and COMPLETED (for newly added leads)
            if (['created', 'paused', 'completed'].includes(campaign.status)) {
                const runLabel = campaign.status === 'completed' ? '▶ Run (New Leads)' : '▶ Run';
                buttons.push(`<button onclick="runCampaign()" class="btn btn-primary">${runLabel}</button>`);
            }
            
            if (campaign.status === 'running') {
                buttons.push(`<button onclick="pauseCampaign()" class="btn btn-secondary">⏸ Pause</button>`);
            }
            
            buttons.push(`<button onclick="exportCampaign()" class="btn btn-secondary">⬇ Export</button>`);
            
            // Add toggle dry-run button
            const dryRunLabel = campaign.dry_run ? '🚀 Go Live' : '🧪 Switch to Dry Run';
            const dryRunClass = campaign.dry_run ? 'btn-success' : 'btn-secondary';
            buttons.push(`<button onclick="toggleDryRun()" class="btn ${dryRunClass}">${dryRunLabel}</button>`);
            
            buttons.push(`<button onclick="deleteCampaign()" class="btn btn-danger">🗑 Delete</button>`);
            
            return buttons.join('');
        }
        
        // Track upload state
        let isUploading = false;

        function renderUploadSection(existingFilename) {
            const isAppend = !!existingFilename;
            const title = isAppend ? '📤 Add More Leads' : '📤 Upload Leads File';
            const description = isAppend
                ? 'Drop a file here or click to add more leads. Duplicate emails will be automatically skipped.'
                : 'Drag & drop your file here, or click to browse';

            return `
                <div class="section-card">
                    <h3>${title}</h3>
                    <div class="upload-area" id="upload-dropzone" onclick="triggerFileSelect()" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
                        <input type="file" id="file-input" name="file" accept=".csv,.xls,.xlsx,.xlsm" style="display: none;" onchange="handleFileSelected(this)">
                        <div id="upload-content">
                            <div style="font-size: 2rem; margin-bottom: 0.5rem;">📁</div>
                            <p style="color: var(--color-gray-500); margin-bottom: 0.5rem;">${description}</p>
                            <p id="upload-status" style="font-size: 0.875rem; color: var(--color-primary); min-height: 1.25rem;"></p>
                        </div>
                    </div>
                    <p style="margin-bottom: 0; margin-top: 1rem; font-size: 0.875rem; color: var(--color-gray-500);">
                        Supported formats: CSV, Excel (.xls, .xlsx)
                        ${isAppend ? '<br><strong>Note:</strong> Emails already in this campaign will be skipped automatically.' : ''}
                    </p>
                </div>
            `;
        }

        function triggerFileSelect() {
            if (isUploading) return;
            document.getElementById('file-input').click();
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.stopPropagation();
            if (isUploading) return;
            document.getElementById('upload-dropzone').classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById('upload-dropzone').classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            if (isUploading) return;
            document.getElementById('upload-dropzone').classList.remove('drag-over');

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                if (isValidFileType(file.name)) {
                    uploadFile(file);
                } else {
                    showUploadStatus('❌ Invalid file type. Please use CSV or Excel.', 'error');
                }
            }
        }

        function handleFileSelected(input) {
            const file = input.files[0];
            if (file) {
                if (isValidFileType(file.name)) {
                    uploadFile(file);
                } else {
                    showUploadStatus('❌ Invalid file type. Please use CSV or Excel.', 'error');
                    input.value = '';
                }
            }
        }

        function isValidFileType(filename) {
            const ext = filename.toLowerCase();
            return ext.endsWith('.csv') || ext.endsWith('.xls') || ext.endsWith('.xlsx') || ext.endsWith('.xlsm');
        }

        function showUploadStatus(message, type = 'info') {
            const statusEl = document.getElementById('upload-status');
            if (statusEl) {
                statusEl.textContent = message;
                statusEl.style.color = type === 'error' ? 'var(--color-danger)' : 'var(--color-primary)';
            }
        }

        async function uploadFile(file) {
            if (isUploading) return;

            isUploading = true;
            showUploadStatus('⏳ Uploading...');

            // Disable the dropzone visually
            const dropzone = document.getElementById('upload-dropzone');
            if (dropzone) {
                dropzone.style.opacity = '0.6';
                dropzone.style.cursor = 'not-allowed';
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`/api/campaigns/${campaignId}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    // Build success message
                    let message;
                    if (data.mode === 'append') {
                        message = `✅ ${data.added_rows} new leads added`;
                        if (data.skipped_duplicates > 0) {
                            message += `, ${data.skipped_duplicates} duplicates skipped`;
                        }
                        if (data.skipped_invalid > 0) {
                            message += `, ${data.skipped_invalid} invalid skipped`;
                        }
                    } else {
                        message = `✅ File uploaded! ${data.row_count} rows detected.`;
                    }

                    showUploadStatus(message, 'success');

                    // Short delay then reload to show updated state
                    setTimeout(() => {
                        location.reload();
                    }, 1500);
                } else {
                    isUploading = false;
                    showUploadStatus('❌ ' + (data.detail || 'Upload failed'), 'error');
                    if (dropzone) {
                        dropzone.style.opacity = '1';
                        dropzone.style.cursor = 'pointer';
                    }
                    // Clear file input for retry
                    document.getElementById('file-input').value = '';
                }
            } catch (error) {
                isUploading = false;
                showUploadStatus('❌ Error: ' + error.message, 'error');
                if (dropzone) {
                    dropzone.style.opacity = '1';
                    dropzone.style.cursor = 'pointer';
                }
                document.getElementById('file-input').value = '';
            }
        }
        
        function renderErrorsSection(errors) {
            return `
                <div class="error-section">
                    <h3>⚠️ Processing Errors</h3>
                    <ul class="error-list">
                        ${errors.map(e => `<li>${e}</li>`).join('')}
                    </ul>
                </div>
            `;
        }
        
        function renderSchemaSection(schema) {
            return `
                <div class="section-card" style="background: #eff6ff; border-color: #dbeafe;">
                    <h3 style="color: #1e40af;">📊 Inferred Schema</h3>
                    <div class="schema-grid">
                        <div class="schema-item">
                            <label>Email Column</label>
                            <value>${schema.primary_email_column || 'Not detected'}</value>
                        </div>
                        <div class="schema-item">
                            <label>Confidence</label>
                            <value><span class="confidence-badge">${Math.round((schema.confidence || 0) * 100)}%</span></value>
                        </div>
                        <div class="schema-item">
                            <label>Name Columns</label>
                            <value>${schema.recipient_name_columns?.join(', ') || 'None'}</value>
                        </div>
                        <div class="schema-item">
                            <label>Company Columns</label>
                            <value>${schema.company_columns?.join(', ') || 'None'}</value>
                        </div>
                        <div class="schema-item" style="grid-column: 1 / -1;">
                            <label>Personalization Fields</label>
                            <value>${schema.personalization_columns?.join(', ') || 'None'}</value>
                        </div>
                    </div>
                    ${schema.unresolved_questions?.length ? `
                        <div class="alert alert-warning" style="margin-top: 1rem; margin-bottom: 0;">
                            <strong>Open Questions:</strong> ${schema.unresolved_questions.join(', ')}
                        </div>
                    ` : ''}
                </div>
            `;
        }
        
        // Track edit mode for campaign plan
        let isEditingPlan = false;
        
        function canEditPlan(status) {
            const editableStatuses = [
                'awaiting_schema_review',
                'awaiting_campaign_approval',
                'ready_to_send',
                'paused',
                'completed'  // Allow editing plan even after completion for future new leads
            ];
            return editableStatuses.includes(status);
        }
        
        function renderPlanSection(plan) {
            if (isEditingPlan) {
                return renderPlanEditForm(plan);
            }
            return renderPlanReadOnly(plan);
        }
        
        function renderPlanReadOnly(plan) {
            const campaign = window.currentCampaign;
            const showEditButton = campaign && canEditPlan(campaign.status);
            
            return `
                <div class="section-card" style="background: #f0fdf4; border-color: #bbf7d0;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <h3 style="color: #166534;">🎯 Campaign Plan</h3>
                        ${showEditButton ? `
                            <button onclick="editPlan()" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">
                                ✏️ Edit Plan
                            </button>
                        ` : ''}
                    </div>
                    <div class="schema-grid">
                        <div class="schema-item" style="grid-column: 1 / -1;">
                            <label>Goal</label>
                            <value>${plan.inferred_goal || 'Not set'}</value>
                        </div>
                        <div class="schema-item" style="grid-column: 1 / -1;">
                            <label>Tone</label>
                            <value>${plan.tone || 'Not set'}</value>
                        </div>
                        <div class="schema-item" style="grid-column: 1 / -1;">
                            <label>Call to Action</label>
                            <value>${plan.cta || 'Not set'}</value>
                        </div>
                        ${plan.context ? `
                            <div class="schema-item" style="grid-column: 1 / -1;">
                                <label>Campaign Context</label>
                                <value style="white-space: pre-wrap;">${plan.context}</value>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }
        
        function renderPlanEditForm(plan) {
            return `
                <div class="section-card" style="background: #f0fdf4; border-color: #bbf7d0;">
                    <h3 style="color: #166534;">🎯 Campaign Plan (Editing)</h3>
                    <div class="schema-grid">
                        <div class="schema-item" style="grid-column: 1 / -1;">
                            <label>Goal</label>
                            <textarea id="edit-goal" rows="2" style="width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: var(--radius); font-family: inherit;">${plan.inferred_goal || ''}</textarea>
                        </div>
                        <div class="schema-item" style="grid-column: 1 / -1;">
                            <label>Tone</label>
                            <textarea id="edit-tone" rows="2" style="width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: var(--radius); font-family: inherit;">${plan.tone || ''}</textarea>
                        </div>
                        <div class="schema-item" style="grid-column: 1 / -1;">
                            <label>Call to Action</label>
                            <textarea id="edit-cta" rows="2" style="width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: var(--radius); font-family: inherit;">${plan.cta || ''}</textarea>
                        </div>
                        <div class="schema-item" style="grid-column: 1 / -1;">
                            <label>Campaign Context (Product/Service Description)</label>
                            <textarea id="edit-context" rows="4" style="width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: var(--radius); font-family: inherit;">${plan.context || ''}</textarea>
                        </div>
                    </div>
                    <div style="margin-top: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
                        <button onclick="savePlanOnly()" class="btn btn-primary">
                            💾 Save Plan
                        </button>
                        <button onclick="savePlanAndRegenerate()" class="btn btn-secondary" title="Updates sample drafts for preview only - does not affect sent emails">
                            🔄 Save & Regenerate Sample Drafts
                        </button>
                        <button onclick="cancelEdit()" class="btn btn-secondary">
                            Cancel
                        </button>
                    </div>
                    <div id="edit-status" style="margin-top: 0.75rem; min-height: 1.5rem;"></div>
                </div>
            `;
        }
        
        function editPlan() {
            isEditingPlan = true;
            loadCampaign();
        }
        
        function cancelEdit() {
            isEditingPlan = false;
            loadCampaign();
        }
        
        // Helper to get plan data from form
        function getPlanDataFromForm() {
            return {
                inferred_goal: document.getElementById('edit-goal').value,
                tone: document.getElementById('edit-tone').value,
                cta: document.getElementById('edit-cta').value,
                context: document.getElementById('edit-context').value
            };
        }

        // Save plan only (no draft regeneration)
        async function savePlanOnly() {
            const confirmed = confirm(
                "Save campaign plan changes?\n\n" +
                "This updates the plan that will be used for any new leads you add later. " +
                "Already sent emails will not be affected."
            );

            if (!confirmed) return;

            const statusDiv = document.getElementById('edit-status');
            statusDiv.innerHTML = '<span style="color: var(--color-primary);">⏳ Saving plan...</span>';

            try {
                const planData = getPlanDataFromForm();

                const saveResponse = await fetch(`/api/campaigns/${campaignId}/plan`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(planData)
                });

                if (!saveResponse.ok) {

        function renderPagination(currentPage, totalPages, total) {
            if (totalPages <= 1) return '';
            
            const startItem = (currentPage - 1) * pageSize + 1;
            const endItem = Math.min(currentPage * pageSize, total);
            
            let buttons = '';
            
            if (currentPage > 1) {
                buttons += `<button onclick="changePage(${currentPage - 1})" class="btn btn-small">← Prev</button>`;
            }
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    buttons += `<button class="btn btn-small" style="background: var(--color-primary); color: white;" disabled>${i}</button>`;
                } else if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    buttons += `<button onclick="changePage(${i})" class="btn btn-small">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    buttons += `<span style="color: var(--color-gray-400); padding: 0 0.25rem;">...</span>`;
                }
            }
            
            if (currentPage < totalPages) {
                buttons += `<button onclick="changePage(${currentPage + 1})" class="btn btn-small">Next →</button>`;
            }
            
            return `
                <div class="pagination">
                    <div class="pagination-info">Showing ${startItem}-${endItem} of ${total}</div>
                    <div class="pagination-buttons">${buttons}</div>
                </div>
            `;
        }

        // Action handlers

        // Polling for real-time status updates during sending

        function startSendPolling() {
            // Stop any existing polling
            stopSendPolling();

            // Poll every 2 seconds during active sending
            sendPollInterval = setInterval(async () => {
                try {
                    // Refresh progress and rows
                    await Promise.all([
                        loadProgress(),
                        loadRows(totalRows, currentPage)
                    ]);
                } catch (e) {
                    // Silent fail - polling is best-effort
                    console.log('Poll refresh failed:', e);
                }
            }, 2000);

            console.log('Started real-time status polling');
        }

        function stopSendPolling() {
            if (sendPollInterval) {
                clearInterval(sendPollInterval);
                sendPollInterval = null;
                console.log('Stopped real-time status polling');
            }
        }

        function updateAnalysisProgress(data) {
            const fill = document.getElementById('analysis-progress-fill');
            const percent = document.getElementById('analysis-percent');
            const status = document.getElementById('analysis-status');
            const currentRow = document.getElementById('analysis-current-row');
            
            if (fill) fill.style.width = `${data.percent_complete || 0}%`;

        function connectProgressStream(campaignId) {
            if (eventSource) eventSource.close();
            
            eventSource = new EventSource(`/api/campaigns/${campaignId}/progress-stream`);
            
            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    updateAnalysisProgress(data);
                    
                    if (data.status === 'complete' || data.status === 'error') {
                        eventSource.close();
                        setTimeout(() => {
                            hideAnalysisProgress();
                            location.reload();
                        }, 1000);
                    }
                } catch (e) {
                    console.error('Failed to parse progress data:', e);
                }
            };
            
            eventSource.onerror = (error) => {
                console.error('EventSource error:', error);
                eventSource.close();
            };
        }
        
        let isAnalyzing = false;
        
        async function analyzeCampaign(forceRestart = false) {
            if (isAnalyzing) {
                alert('Analysis is already running. Please wait for it to complete.');
                return;
            }
            
            isAnalyzing = true;
            showAnalysisProgress();
            connectProgressStream(campaignId);
            
            try {
                const url = `/api/campaigns/${campaignId}/analyze` + (forceRestart ? '?force_restart=true' : '');
                const response = await fetch(url, { method: 'POST' });
                const data = await response.json();
                
                if (!response.ok) {
                    if (eventSource) eventSource.close();
                    hideAnalysisProgress();
                    // Handle 423 Locked status specifically
                    if (response.status === 423) {
                        alert('Analysis is currently locked: ' + (data.detail || 'Another campaign is being analyzed. Please wait and try again.'));
                    } else {
                        alert('Analysis failed: ' + (data.detail || 'Unknown error'));
                    }
                }
            } catch (error) {
                if (eventSource) eventSource.close();
                hideAnalysisProgress();
                alert('Error: ' + error.message);
            } finally {
                isAnalyzing = false;
            }
        }

                    headers: { 'Content-Type': 'application/json' }

        async function retryAllFailed() {
            try {
                const response = await fetch(`/api/campaigns/${campaignId}/rows?page=1&page_size=100`);
                const data = await response.json();
                
                const failedRows = data.rows.filter(r => r.status === 'failed');
                
                if (failedRows.length === 0) {
                    alert('No failed rows to retry.');
                    return;
                }
                
                if (!confirm(`Retry sending emails to ${failedRows.length} failed recipients?`)) {
                    return;
                }
                
                let successCount = 0;
                let failCount = 0;
                
                for (const row of failedRows) {
                    try {
                        const retryResponse = await fetch(`/api/campaigns/${campaignId}/rows/${row.id}/retry`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' }
                        });
                        
                        const retryData = await retryResponse.json();
                        
                        if (retryResponse.ok && retryData.success) {
                            successCount++;
                        } else {
                            failCount++;
                        }
                    } catch (e) {
                        failCount++;
                    }
                }
                
                alert(`Retry complete: ${successCount} sent successfully, ${failCount} still failed.`);
                loadRows(totalRows, currentPage);
                loadProgress();
            } catch (error) {
                alert('Error retrying failed rows: ' + error.message);
            }
        }

                const existingModal = document.getElementById('draft-modal');
                if (existingModal) existingModal.remove();
                
                document.body.insertAdjacentHTML('beforeend', modalHtml);
                document.getElementById('draft-modal').style.display = 'block';
                
            } catch (error) {
                alert('Failed to load draft: ' + error.message);
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
        
        function switchToEditMode() {
            document.getElementById('draft-view-mode').style.display = 'none';
            document.getElementById('draft-edit-mode').style.display = 'block';
            document.getElementById('view-actions').style.display = 'none';
            document.getElementById('edit-actions').style.display = 'flex';
        }
        
        function switchToViewMode() {
            document.getElementById('draft-edit-mode').style.display = 'none';
            document.getElementById('draft-view-mode').style.display = 'block';
            document.getElementById('edit-actions').style.display = 'none';
            document.getElementById('view-actions').style.display = 'flex';
        }
        
        async function saveDraft() {
            if (!currentRowId) return;
            
            const subject = document.getElementById('edit-subject').value;
            const body = document.getElementById('edit-body').value;
            
            try {
                const response = await fetch(`/api/campaigns/${campaignId}/rows/${currentRowId}/draft`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ subject: subject, plain_text_body: body })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to save draft');
                }
                
                document.getElementById('view-subject').textContent = data.subject;
                document.getElementById('view-body').textContent = data.plain_text_body;
                
                switchToViewMode();
                loadRows(totalRows, currentPage);
                
            } catch (error) {
                alert('Failed to save draft: ' + error.message);
            }
        }
        
        function closeModal() {
            const modal = document.getElementById('draft-modal');
            if (modal) modal.remove();
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('draft-modal');
            if (event.target === modal) {
                closeModal();
            }
        };
        

        
        // Clean up polling when leaving the page
        window.addEventListener('beforeunload', () => {
            stopSendPolling();
            if (eventSource) {
                eventSource.close();
            }
        });

        loadCampaign();
    </script>
</body>
</html>
