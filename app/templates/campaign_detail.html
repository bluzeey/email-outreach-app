<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Details - Email Outreach App</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/campaign.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Email Outreach App</h1>
            <nav>
                <a href="/">Home</a>
                <a href="/campaigns">Campaigns</a>
                <a href="/auth">Connect Gmail</a>
            </nav>
        </header>
        
        <main>
            <div id="campaign-details">
                <p>Loading campaign...</p>
            </div>
        </main>
        
        <footer>
            <p>Email Outreach App - Built with FastAPI + LangGraph</p>
        </footer>
    </div>
    
    <script>
        const campaignId = window.location.pathname.split('/').pop();
        
        async function loadCampaign() {
            try {
                const response = await fetch(`/api/campaigns/${campaignId}`);
                const campaign = await response.json();
                
                if (!response.ok) {
                    throw new Error(campaign.detail || 'Failed to load campaign');
                }
                
                const container = document.getElementById('campaign-details');
                
                container.innerHTML = `
                    <div class="page-header">
                        <div>
                            <h2>${campaign.name}</h2>
                            <span class="status-badge status-${campaign.status}">${campaign.status}</span>
                            ${campaign.dry_run ? '<span class="badge">DRY RUN</span>' : ''}
                        </div>
                        <div class="actions">
                            ${getActionButtons(campaign)}
                        </div>
                    </div>
                    
                    <div class="campaign-info">
                        <p><strong>Created:</strong> ${new Date(campaign.created_at).toLocaleString()}</p>
                        ${campaign.csv_filename ? `<p><strong>File:</strong> ${campaign.csv_filename}</p>` : ''}
                        ${campaign.context ? `<p><strong>Context:</strong> ${campaign.context}</p>` : ''}
                        ${campaign.totals_json && campaign.totals_json.total_rows ? `<p><strong>Recipients:</strong> ${campaign.totals_json.total_rows} valid emails</p>` : ''}
                    </div>
                    
                    ${campaign.errors && campaign.errors.length > 0 ? renderErrorsSection(campaign.errors) : ''}
                    
                    ${campaign.csv_filename ? '' : renderUploadSection()}
                    
                    ${campaign.sample_drafts_json && campaign.sample_drafts_json.length > 0 ? renderSampleDraftsSection(campaign.sample_drafts_json) : ''}
                    
                    ${campaign.inferred_schema_json && Object.keys(campaign.inferred_schema_json).length > 0 ? renderSchemaSection(campaign.inferred_schema_json) : ''}
                    
                    ${campaign.campaign_plan_json && Object.keys(campaign.campaign_plan_json).length > 0 ? renderPlanSection(campaign.campaign_plan_json) : ''}
                    
                    <div id="progress-section"></div>
                    
                    <div id="rows-section">
                        <h3>Recipients</h3>
                        <p>Loading...</p>
                    </div>
                `;
                
                // Load progress if campaign is running or completed
                if (['running', 'completed', 'paused'].includes(campaign.status)) {
                    loadProgress();
                }
                
                // Load rows with expected count
                const expectedCount = campaign.totals_json ? campaign.totals_json.total_rows : 0;
                loadRows(expectedCount);
                
            } catch (error) {
                document.getElementById('campaign-details').innerHTML = `
                    <div class="error">Failed to load campaign: ${error.message}</div>
                `;
            }
        }
        
        function getActionButtons(campaign) {
            const buttons = [];
            
            if (['created', 'profiling'].includes(campaign.status)) {
                if (campaign.csv_filename) {
                    // Check if we have partial data (interrupted analysis)
                    if (campaign.totals_json && campaign.totals_json.total_rows > 0) {
                        buttons.push(`<button onclick="analyzeCampaign()" class="btn btn-primary">🔄 Resume Analysis</button>`);
                        buttons.push(`<button onclick="analyzeCampaign(true)" class="btn btn-secondary">Restart</button>`);
                    } else {
                        buttons.push(`<button onclick="analyzeCampaign()" class="btn btn-primary">🔍 Analyze</button>`);
                    }
                }
            }
            
            if (['awaiting_schema_review', 'awaiting_campaign_approval'].includes(campaign.status)) {
                buttons.push(`<button onclick="startSending()" class="btn btn-primary">📧 Start Sending</button>`);
                buttons.push(`<button onclick="rejectCampaign()" class="btn btn-secondary">Reject</button>`);
            }
            
            if (['created', 'paused'].includes(campaign.status)) {
                buttons.push(`<button onclick="runCampaign()" class="btn btn-primary">Run</button>`);
            }
            
            if (campaign.status === 'running') {
                buttons.push(`<button onclick="pauseCampaign()" class="btn btn-secondary">Pause</button>`);
            }
            
            // Add delete button (always available but styled as danger)
            buttons.push(`<button onclick="deleteCampaign()" class="btn btn-danger">🗑️ Delete</button>`);
            
            buttons.push(`<button onclick="exportCampaign()" class="btn btn-secondary">Export</button>`);
            
            return buttons.join(' ');
        }
        
        function renderUploadSection() {
            return `
                <div class="upload-section">
                    <h3>Upload Leads File</h3>
                    <p>Supported formats: CSV, Excel (.xls, .xlsx)</p>
                    <form id="upload-form" enctype="multipart/form-data">
                        <input type="file" name="file" accept=".csv,.xls,.xlsx,.xlsm" required>
                        <button type="submit" class="btn btn-primary">Upload</button>
                    </form>
                </div>
            `;
        }
        
        function renderErrorsSection(errors) {
            if (!errors || errors.length === 0) return '';
            
            const errorList = errors.map(e => `<li>${e}</li>`).join('');
            return `
                <div class="errors-section">
                    <h3>⚠️ Processing Errors</h3>
                    <ul>${errorList}</ul>
                </div>
            `;
        }
        
        function renderSchemaSection(schema) {
            return `
                <div class="schema-section">
                    <h3>Inferred Schema</h3>
                    <p><strong>Email Column:</strong> ${schema.primary_email_column || 'Not detected'}</p>
                    <p><strong>Name Columns:</strong> ${schema.recipient_name_columns?.join(', ') || 'None'}</p>
                    <p><strong>Company Columns:</strong> ${schema.company_columns?.join(', ') || 'None'}</p>
                    <p><strong>Personalization:</strong> ${schema.personalization_columns?.slice(0, 5).join(', ') || 'None'}${schema.personalization_columns?.length > 5 ? '...' : ''}</p>
                    <p><strong>Confidence:</strong> ${Math.round((schema.confidence || 0) * 100)}%</p>
                    ${schema.unresolved_questions?.length ? `<p class="warning"><strong>Questions:</strong> ${schema.unresolved_questions.join(', ')}</p>` : ''}
                </div>
            `;
        }
        
        function renderPlanSection(plan) {
            return `
                <div class="plan-section">
                    <h3>Campaign Plan</h3>
                    <p><strong>Goal:</strong> ${plan.inferred_goal}</p>
                    <p><strong>Tone:</strong> ${plan.tone}</p>
                    <p><strong>CTA:</strong> ${plan.cta}</p>
                </div>
            `;
        }
        
        function renderSampleDraftsSection(drafts) {
            if (!drafts || drafts.length === 0) return '';
            
            const draftCards = drafts.map((draft, idx) => `
                <div class="draft-card">
                    <div class="draft-header">
                        <span class="draft-number">Sample ${idx + 1}</span>
                        <span class="draft-confidence">${Math.round((draft.generation_confidence || 0) * 100)}% confidence</span>
                    </div>
                    <div class="draft-content">
                        <p><strong>To:</strong> ${draft.to || 'N/A'}</p>
                        <p><strong>Subject:</strong> ${draft.subject || 'N/A'}</p>
                        <div class="draft-body">
                            <p><strong>Email Body:</strong></p>
                            <pre>${draft.plain_text_body || 'No content'}</pre>
                        </div>
                        ${draft.needs_human_review ? `<p class="warning">⚠️ Needs human review: ${(draft.review_reasons || []).join(', ')}</p>` : ''}
                    </div>
                </div>
            `).join('');
            
            return `
                <div class="drafts-section">
                    <h3>📧 Sample Email Drafts</h3>
                    <p class="section-desc">Review these AI-generated sample emails before approving the campaign:</p>
                    <div class="drafts-container">
                        ${draftCards}
                    </div>
                </div>
            `;
        }
        
        async function loadProgress() {
            try {
                const response = await fetch(`/api/campaigns/${campaignId}/progress`);
                const progress = await response.json();
                
                const section = document.getElementById('progress-section');
                section.innerHTML = `
                    <h3>Progress</h3>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress.percentage_complete}%"></div>
                    </div>
                    <p>${progress.percentage_complete}% complete</p>
                    <p>Total: ${progress.total_rows} | Sent: ${progress.sent_count} | Failed: ${progress.failed_count} | Skipped: ${progress.skipped_count}</p>
                `;
            } catch (error) {
                console.error('Failed to load progress:', error);
            }
        }
        
        let currentPage = 1;
        const pageSize = 10;
        let totalRows = 0;
        
        // Pagination functions defined BEFORE loadRows to ensure availability
        function renderPagination(currentPage, totalPages, total) {
            console.log('renderPagination called:', { currentPage, totalPages, total });
            
            if (totalPages <= 1) {
                console.log('Only 1 page, no pagination needed');
                return '';
            }
            
            const startItem = (currentPage - 1) * pageSize + 1;
            const endItem = Math.min(currentPage * pageSize, total);
            
            let buttons = '';
            
            // Previous button
            if (currentPage > 1) {
                buttons += `<button onclick="changePage(${currentPage - 1})" class="btn btn-small">← Previous</button>`;
            }
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    buttons += `<button class="btn btn-small btn-active" disabled>${i}</button>`;
                } else if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    buttons += `<button onclick="changePage(${i})" class="btn btn-small">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    buttons += `<span class="pagination-ellipsis">...</span>`;
                }
            }
            
            // Next button
            if (currentPage < totalPages) {
                buttons += `<button onclick="changePage(${currentPage + 1})" class="btn btn-small">Next →</button>`;
            }
            
            const html = `
                <div class="pagination">
                    <div class="pagination-info">Showing ${startItem}-${endItem} of ${total}</div>
                    <div class="pagination-buttons">${buttons}</div>
                </div>
            `;
            console.log('Pagination HTML generated:', html);
            return html;
        }
        
        function changePage(page) {
            console.log('changePage called:', page);
            loadRows(totalRows, page);
        }
        
        async function loadRows(expectedCount, page = 1) {
            try {
                console.log('loadRows called:', { expectedCount, page });
                currentPage = page;
                const response = await fetch(`/api/campaigns/${campaignId}/rows?page=${page}&page_size=${pageSize}`);
                const data = await response.json();
                
                console.log('loadRows data received:', { total: data.total, rowsCount: data.rows.length });
                
                totalRows = data.total;
                const totalPages = Math.ceil(totalRows / pageSize);
                
                console.log('Pagination calc:', { totalRows, totalPages, pageSize });
                
                const section = document.getElementById('rows-section');
                
                if (data.rows.length === 0) {
                    // No recipients loaded yet
                    let message = 'No recipients yet.';
                    if (expectedCount && expectedCount > 0) {
                        message = `Expected ${expectedCount} recipients, but none were created. This may indicate a processing error.`;
                    } else {
                        message = 'No recipients yet. Upload a CSV to add recipients.';
                    }
                    
                    section.innerHTML = `
                        <h3>Recipients</h3>
                        <p class="warning">${message}</p>
                    `;
                    return;
                }
                
                const paginationHtml = renderPagination(page, totalPages, data.total);
                console.log('Pagination HTML length:', paginationHtml.length);
                
                section.innerHTML = `
                    <h3>Recipients (${data.total} total)</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Email</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.rows.map(r => `
                                <tr>
                                    <td>${r.row_number}</td>
                                    <td>${r.recipient_email || 'N/A'}</td>
                                    <td><span class="status-badge status-${r.status}">${r.status}</span></td>
                                    <td>
                                        <button onclick="previewDraft('${r.id}')" class="btn btn-small btn-icon" title="Preview/Edit Email">👁️</button>
                                        ${r.status === 'awaiting_review' ? `
                                            <button onclick="approveRow('${r.id}')" class="btn btn-small">Approve</button>
                                            <button onclick="rejectRow('${r.id}')" class="btn btn-small">Reject</button>
                                        ` : ''}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    ${paginationHtml}
                `;
            } catch (error) {
                console.error('loadRows error:', error);
                document.getElementById('rows-section').innerHTML = `
                    <h3>Recipients</h3>
                    <p class="error">Failed to load recipients: ${error.message}</p>
                `;
            }
        }
        
        // Action handlers
        let eventSource = null;
        
        function showAnalysisProgress() {
            const section = document.getElementById('progress-section');
            section.innerHTML = `
                <div class="analysis-progress">
                    <h3>🔍 Analyzing Campaign</h3>
                    <div class="progress-bar-container">
                        <div class="progress-bar">
                            <div id="analysis-progress-fill" class="progress-fill" style="width: 0%"></div>
                        </div>
                        <span id="analysis-progress-text">0%</span>
                    </div>
                    <p id="analysis-status">Initializing...</p>
                    <p id="analysis-current-row" style="font-size: 0.875rem; color: #6b7280;"></p>
                </div>
            `;
        }
        
        function updateAnalysisProgress(data) {
            const fill = document.getElementById('analysis-progress-fill');
            const text = document.getElementById('analysis-progress-text');
            const status = document.getElementById('analysis-status');
            const currentRow = document.getElementById('analysis-current-row');
            
            if (fill) {
                fill.style.width = `${data.percent_complete || 0}%`;
            }
            if (text) {
                text.textContent = `${data.percent_complete || 0}%`;
            }
            if (status) {
                status.textContent = data.message || 'Processing...';
            }
            if (currentRow && data.current_row) {
                currentRow.textContent = `Processing row ${data.current_row} of ${data.total_rows || '?'}`;
            }
        }
        
        function hideAnalysisProgress() {
            const section = document.getElementById('progress-section');
            section.innerHTML = '';
        }
        
        function connectProgressStream(campaignId) {
            if (eventSource) {
                eventSource.close();
            }
            
            eventSource = new EventSource(`/api/campaigns/${campaignId}/progress-stream`);
            
            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    updateAnalysisProgress(data);
                    
                    if (data.status === 'complete' || data.status === 'error') {
                        eventSource.close();
                        setTimeout(() => {
                            hideAnalysisProgress();
                            location.reload();
                        }, 1000);
                    }
                } catch (e) {
                    console.error('Failed to parse progress data:', e);
                }
            };
            
            eventSource.onerror = (error) => {
                console.error('EventSource error:', error);
                eventSource.close();
            };
        }
        
        async function analyzeCampaign(forceRestart = false) {
            // Show progress UI
            showAnalysisProgress();
            
            // Connect to progress stream
            connectProgressStream(campaignId);
            
            try {
                const url = `/api/campaigns/${campaignId}/analyze` + (forceRestart ? '?force_restart=true' : '');
                const response = await fetch(url, { method: 'POST' });
                const data = await response.json();
                
                if (response.ok) {
                    // Progress stream will handle the UI updates
                    console.log('Analysis complete:', data);
                    if (forceRestart) {
                        alert(`Analysis restarted! Inferred ${data.schema_inference.personalization_columns?.length || 0} personalization fields.`);
                    }
                } else {
                    alert('Analysis failed: ' + (data.detail || 'Unknown error'));
                    if (eventSource) {
                        eventSource.close();
                    }
                    hideAnalysisProgress();
                }
            } catch (error) {
                alert('Error: ' + error.message);
                if (eventSource) {
                    eventSource.close();
                }
                hideAnalysisProgress();
            }
        }
        
        async function deleteCampaign() {
            if (!confirm('Are you sure you want to delete this campaign? All data will be permanently removed.')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/campaigns/${campaignId}`, { method: 'DELETE' });
                const data = await response.json();
                
                if (data.success) {
                    alert('Campaign deleted successfully');
                    window.location.href = '/campaigns';
                } else {
                    alert('Delete failed: ' + data.message);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function approveCampaign() {
            try {
                const response = await fetch(`/api/campaigns/${campaignId}/approve`, { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    alert('Campaign approved! Starting to send emails...');
                    location.reload();
                } else {
                    alert('Approval failed: ' + data.message);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function startSending() {
            // startSending is the same as approveCampaign - just a clearer name
            await approveCampaign();
        }
        
        async function rejectCampaign() {
            if (!confirm('Are you sure you want to reject this campaign?')) return;
            
            try {
                const response = await fetch(`/api/campaigns/${campaignId}/reject`, { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    location.reload();
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function runCampaign() {
            try {
                const response = await fetch(`/api/campaigns/${campaignId}/run`, { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    alert(data.message);
                    location.reload();
                } else {
                    alert('Failed: ' + data.message);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function pauseCampaign() {
            try {
                const response = await fetch(`/api/campaigns/${campaignId}/pause`, { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    location.reload();
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function exportCampaign() {
            try {
                const response = await fetch(`/api/campaigns/${campaignId}/export?format=csv`);
                const data = await response.json();
                
                if (data.download_url) {
                    alert('Export ready! Download link: ' + data.download_url);
                }
            } catch (error) {
                alert('Export failed: ' + error.message);
            }
        }
        
        async function approveRow(rowId) {
            try {
                const response = await fetch(`/api/campaigns/${campaignId}/rows/${rowId}/approve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ decision: 'approved' })
                });
                
                if (response.ok) {
                    loadRows();
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function rejectRow(rowId) {
            try {
                const response = await fetch(`/api/campaigns/${campaignId}/rows/${rowId}/reject`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ decision: 'rejected' })
                });
                
                if (response.ok) {
                    loadRows();
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        // Store draft data for editing
        let currentDraftData = null;
        let currentRowId = null;
        
        async function previewDraft(rowId) {
            try {
                currentRowId = rowId;
                const response = await fetch(`/api/campaigns/${campaignId}/rows/${rowId}/draft`);
                const draft = await response.json();
                
                if (!response.ok) {
                    throw new Error(draft.detail || 'Failed to load draft');
                }
                
                currentDraftData = draft;
                
                // Create modal content with view mode by default
                const modalHtml = `
                    <div id="draft-modal" class="modal">
                        <div class="modal-content">
                            <span class="close" onclick="closeModal()">&times;</span>
                            <h3>📧 Email Preview</h3>
                            <div id="draft-view-mode" class="draft-preview">
                                <p><strong>To:</strong> ${draft.to || 'N/A'}</p>
                                <p><strong>Subject:</strong> <span id="view-subject">${escapeHtml(draft.subject)}</span></p>
                                <hr>
                                <div class="email-body">
                                    <p><strong>Email Body:</strong></p>
                                    <pre id="view-body">${escapeHtml(draft.plain_text_body)}</pre>
                                </div>
                                ${draft.needs_human_review ? `<p class="warning">⚠️ ${draft.review_reasons?.join(', ') || 'Needs review'}</p>` : ''}
                                <p class="confidence">Confidence: ${draft.generation_confidence}%</p>
                                <div class="modal-actions">
                                    <button onclick="switchToEditMode()" class="btn btn-primary">✏️ Edit</button>
                                    <button onclick="closeModal()" class="btn btn-secondary">Close</button>
                                </div>
                            </div>
                            <div id="draft-edit-mode" class="draft-preview" style="display: none;">
                                <p><strong>To:</strong> ${draft.to || 'N/A'}</p>
                                <p><strong>Subject:</strong> <input type="text" id="edit-subject" value="${escapeHtml(draft.subject)}" class="form-input" style="width: 100%;"></p>
                                <hr>
                                <div class="email-body">
                                    <p><strong>Email Body:</strong></p>
                                    <textarea id="edit-body" class="form-textarea" rows="15" style="width: 100%; font-family: inherit;">${escapeHtml(draft.plain_text_body)}</textarea>
                                </div>
                                <div class="modal-actions">
                                    <button onclick="saveDraft()" class="btn btn-primary">💾 Save</button>
                                    <button onclick="switchToViewMode()" class="btn btn-secondary">Cancel</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                // Remove existing modal if any
                const existingModal = document.getElementById('draft-modal');
                if (existingModal) {
                    existingModal.remove();
                }
                
                // Add modal to page
                document.body.insertAdjacentHTML('beforeend', modalHtml);
                
                // Show modal
                document.getElementById('draft-modal').style.display = 'block';
                
            } catch (error) {
                alert('Failed to load draft: ' + error.message);
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
        
        function switchToEditMode() {
            document.getElementById('draft-view-mode').style.display = 'none';
            document.getElementById('draft-edit-mode').style.display = 'block';
        }
        
        function switchToViewMode() {
            document.getElementById('draft-edit-mode').style.display = 'none';
            document.getElementById('draft-view-mode').style.display = 'block';
        }
        
        async function saveDraft() {
            if (!currentRowId) return;
            
            const subject = document.getElementById('edit-subject').value;
            const body = document.getElementById('edit-body').value;
            
            try {
                const response = await fetch(`/api/campaigns/${campaignId}/rows/${currentRowId}/draft`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        subject: subject,
                        plain_text_body: body
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to save draft');
                }
                
                // Update the view with new data
                document.getElementById('view-subject').textContent = data.subject;
                document.getElementById('view-body').textContent = data.plain_text_body;
                
                // Show warning if not already present
                if (data.needs_human_review) {
                    const warningEl = document.querySelector('.warning');
                    if (!warningEl) {
                        const confidenceEl = document.querySelector('.confidence');
                        if (confidenceEl) {
                            confidenceEl.insertAdjacentHTML('beforebegin', `<p class="warning">⚠️ ${data.review_reasons?.join(', ') || 'Needs review'}</p>`);
                        }
                    }
                }
                
                // Switch back to view mode
                switchToViewMode();
                
                // Refresh the rows list to show updated status
                loadRows(totalRows, currentPage);
                
            } catch (error) {
                alert('Failed to save draft: ' + error.message);
            }
        }
        
        function closeModal() {
            const modal = document.getElementById('draft-modal');
            if (modal) {
                modal.remove();
            }
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('draft-modal');
            if (event.target === modal) {
                closeModal();
            }
        }
        
        // Upload form handler
        document.addEventListener('submit', async (e) => {
            if (e.target.id === 'upload-form') {
                e.preventDefault();
                
                const formData = new FormData(e.target);
                
                try {
                    const response = await fetch(`/api/campaigns/${campaignId}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        alert(`File uploaded! ${data.row_count} rows detected.`);
                        location.reload();
                    } else {
                        alert('Upload failed: ' + (data.detail || 'Unknown error'));
                    }
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            }
        });
        
        // Load campaign on page load
        loadCampaign();
    </script>
